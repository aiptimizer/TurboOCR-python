site_name: turboocr
site_description: Typed Python client for the TurboOCR server.
site_url: https://aiptimizer.github.io/TurboOCR-python/
repo_url: https://github.com/aiptimizer/TurboOCR-python
repo_name: aiptimizer/TurboOCR-python
edit_uri: edit/develop/docs/

docs_dir: .
site_dir: ../site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [../src]
          options:
            docstring_style: google
            docstring_section_style: spacy
            members_order: source
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            show_signature_annotations: true
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            show_if_no_docstring: true
            summary: true
            filters: ["!^_"]
  - mike:
      alias_type: symlink
      canonical_version: latest

nav:
  - Overview: index.md
  - Tutorials:
      - tutorials/index.md
      - First PDF→Markdown: tutorials/01_first_pdf_to_markdown.md
      - Async folder pipeline: tutorials/02_async_folder_pipeline.md
  - How-to:
      - how-tos/index.md
      - Configure retries: how-tos/configure_retries.md
      - Non-Latin PDFs: how-tos/handle_non_latin_pdfs.md
      - Custom httpx.Client: how-tos/use_custom_httpx_client.md
      - Batch partial failures: how-tos/batch_with_partial_failures.md
  - Explanation:
      - explanation/index.md
      - Layout & reading order: explanation/layout_and_reading_order.md
      - Searchable PDF internals: explanation/searchable_pdf_internals.md
      - HTTP vs gRPC: explanation/http_vs_grpc.md
  - Clients:
      - HTTP — Client / AsyncClient: api/clients.md
      - gRPC — GrpcClient / AsyncGrpcClient: api/grpc.md
  - Models:
      - Response objects: api/models.md
      - Layout & blocks: api/layout.md
  - Markdown rendering: api/markdown.md
  - Searchable PDF: api/searchable_pdf.md
  - Retries, timeouts, hooks: api/retry.md
  - Errors: api/errors.md
  - CLI: api/cli.md
  - Examples: examples.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  version:
    provider: mike
    default: latest
