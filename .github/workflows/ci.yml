name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: ruff + mypy + pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install deps
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Ruff lint
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Mypy type check
        run: uv run --python ${{ matrix.python-version }} mypy .

      - name: Pytest
        run: uv run --python ${{ matrix.python-version }} pytest tests -q --ignore=tests/integration
