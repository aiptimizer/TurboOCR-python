name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+b[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(uv run --no-project python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (-> $tag) does not match pyproject version $pkg"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches pyproject version $pkg"

      - name: Build distributions
        run: uv build

      - name: Show built artifacts
        run: ls -lh dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test (py${{ matrix.python-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install dev deps + built wheel
        run: |
          uv sync --python ${{ matrix.python-version }} --extra dev
          # Replace the editable src-install with the built wheel so the
          # test matrix exercises the exact artifact that will ship to PyPI.
          VIRTUAL_ENV=.venv uv pip install dist/*.whl --force-reinstall --no-deps

      - name: Ruff lint
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Mypy type check
        run: uv run --python ${{ matrix.python-version }} mypy .

      - name: Pytest
        run: uv run --python ${{ matrix.python-version }} pytest tests -q --ignore=tests/integration

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/turboocr
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: List distributions
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true
          print-hash: true
          verify-metadata: true
