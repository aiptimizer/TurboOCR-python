name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open / update release PR
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # Prefer a PAT so the tags release-please pushes trigger
          # release.yml + docs.yml automatically (GitHub blocks workflow
          # chaining from secrets.GITHUB_TOKEN-authored pushes). Falls
          # back to GITHUB_TOKEN if the PAT secret isn't configured —
          # release-please still works but downstream workflows must be
          # dispatched manually.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
